<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vampire Crawlers 卡牌图鉴</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%231a0a2e'/%3E%3Cpath d='M16 8 L13 4 L8 7 L5 3 L4 10 L9 12 L7 16 L11 18 L16 14 L21 18 L25 16 L23 12 L28 10 L27 3 L24 7 L19 4 Z' fill='%239c27b0'/%3E%3Ccircle cx='12' cy='13' r='1.5' fill='%23ff5252'/%3E%3Ccircle cx='20' cy='13' r='1.5' fill='%23ff5252'/%3E%3Cpath d='M13 20 L16 24 L19 20' fill='none' stroke='%23ff5252' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=MedievalSharp&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 头部：标题 + 搜索 + 选项卡 + 筛选 -->
  <header class="header">
    <div class="header-top">
      <h1><span class="title-en">Vampire Crawlers</span> <span>卡牌图鉴</span></h1>
      <div class="view-toggle" id="viewToggle">
        <button class="view-btn active" data-view="grid" title="表格视图">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="11" y="1" width="6" height="6" rx="1"/><rect x="1" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/></svg>
        </button>
        <button class="view-btn" data-view="list" title="列表视图">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="1" y="2" width="4" height="4" rx="1"/><rect x="7" y="2" width="10" height="4" rx="1"/><rect x="1" y="8" width="4" height="4" rx="1"/><rect x="7" y="8" width="10" height="4" rx="1"/><rect x="1" y="14" width="4" height="4" rx="1"/><rect x="7" y="14" width="10" height="4" rx="1"/></svg>
        </button>
      </div>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜索卡牌名称或拼音首字母（如 sb=神鞭）...">
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="cards">卡牌图鉴</button>
      <button class="tab-btn" data-tab="recipes">合成表</button>
      <button class="tab-btn" data-tab="gems">宝石</button>
      <button class="tab-btn" data-tab="unlocks">解锁项</button>
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="filter-bar" id="manaFilterBar" style="margin-top:8px;"></div>
  </header>

  <!-- 主内容 -->
  <main class="main-content">

    <!-- 统计栏 -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- 全局搜索结果 -->
    <div id="globalSearchSection" style="display:none;"></div>

    <!-- 卡牌图鉴选项卡 -->
    <div id="cardsSection">
      <div class="card-grid" id="cardGrid"></div>
    </div>

    <!-- 合成表选项卡 -->
    <div id="recipesSection" style="display:none;">
      <div class="section-title">全部合成配方</div>
      <div class="recipe-list" id="recipeList"></div>
    </div>

    <!-- 宝石选项卡 -->
    <div id="gemsSection" style="display:none;">
      <div class="gem-rarity-panel" id="gemRarityPanel">
        <div class="gem-rarity-toggle" id="gemRarityToggle">
          <span>宝石稀有度分布</span>
          <span class="toggle-arrow">▸</span>
        </div>
        <div class="gem-rarity-content" id="gemRarityContent" style="display:none;">
          <div class="gem-rarity-tables">
            <div class="gem-rarity-table-wrap">
              <div class="gem-rarity-subtitle">升级时获取</div>
              <table class="gem-rarity-table">
                <thead><tr><th>稀有度</th><th>权重</th><th>运气系数</th></tr></thead>
                <tbody>
                  <tr><td><span class="rarity-dot" style="background:#9e9e9e"></span>普通</td><td>60</td><td>0</td></tr>
                  <tr><td><span class="rarity-dot" style="background:#4caf50"></span>罕见</td><td>30</td><td>0.1</td></tr>
                  <tr><td><span class="rarity-dot" style="background:#2196f3"></span>稀有</td><td>20</td><td>0.25</td></tr>
                  <tr><td><span class="rarity-dot" style="background:#9c27b0"></span>史诗</td><td>2</td><td>0.5</td></tr>
                  <tr><td><span class="rarity-dot" style="background:#ff9800"></span>传说</td><td>0</td><td>0</td></tr>
                </tbody>
              </table>
            </div>
            <div class="gem-rarity-table-wrap">
              <div class="gem-rarity-subtitle">宝箱获取</div>
              <table class="gem-rarity-table">
                <thead><tr><th>稀有度</th><th>宝箱类型</th><th>权重</th></tr></thead>
                <tbody>
                  <tr><td><span class="rarity-dot" style="background:#9e9e9e"></span>普通</td><td>1级宝箱</td><td>100</td></tr>
                  <tr><td><span class="rarity-dot" style="background:#4caf50"></span>罕见</td><td>1级宝箱</td><td>80</td></tr>
                  <tr><td><span class="rarity-dot" style="background:#2196f3"></span>稀有</td><td>1级、2级宝箱</td><td>50</td></tr>
                  <tr><td><span class="rarity-dot" style="background:#9c27b0"></span>史诗</td><td>2级、3级宝箱</td><td>60</td></tr>
                  <tr><td><span class="rarity-dot" style="background:#ff9800"></span>传说</td><td>3级宝箱</td><td>40</td></tr>
                </tbody>
              </table>
              <div class="gem-rarity-note">
                1级宝箱：地下城中常见的普通宝箱<br>
                2级宝箱：稀有的紫色上锁宝箱，需要牺牲卡牌开启<br>
                3级宝箱：击败楼层Boss或小Boss后获得的华丽宝箱
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="gem-grid" id="gemGrid"></div>
    </div>

    <!-- 解锁项选项卡 -->
    <div id="unlocksSection" style="display:none;">
      <div class="unlock-grid" id="unlockGrid"></div>
    </div>

  </main>

  <!-- 卡牌详情弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal"></div>
  </div>

  <!-- 脚本 -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
